<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — DragonBallDle</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --glass: rgba(0, 0, 0, 0.55);
        --brd: rgba(255, 255, 255, 0.14);
        --accent: #fb8c00;
        --txt: #fff;
        --muted: #f5f7fb;
        --shadow: 0 2px 0 rgba(0, 0, 0, 0.55), 0 6px 24px rgba(0, 0, 0, 0.38);
        --txt-shadow: 0 2px 8px rgba(0, 0, 0, 0.9), 0 1px 0 rgba(0, 0, 0, 0.8);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        color: var(--txt);
        background: #0b1120 url("/assets/background-img.jpg") center/cover fixed
          no-repeat;
      }

      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: clamp(16px, 3vw, 32px);
      }

      .card {
        width: min(880px, 94vw);
        background: var(--glass);
        border: 1px solid var(--brd);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: clamp(24px, 3.2vw, 32px);
        backdrop-filter: blur(6px);
      }

      .title {
        margin: 0 0 14px;
        font-size: clamp(28px, 5.6vw, 42px);
        font-weight: 900;
        letter-spacing: 0.2px;
        text-align: center;
        color: #fff;
        text-shadow: var(--txt-shadow);
      }

      .row {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: clamp(18px, 3.2vw, 32px);
        align-items: center;
      }

      .thumb {
        width: 100%;
        aspect-ratio: 1/1;
        border-radius: 18px;
        border: 2px solid var(--brd);
        overflow: hidden;
        display: grid;
        place-items: center;
        background: #0b0f19;
        box-shadow: var(--shadow);
        flex-shrink: 0;
      }
      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .content {
        min-width: 0; /* evita overflow do grid */
      }

      .line {
        font-size: clamp(16px, 2.6vw, 18px);
        color: var(--muted);
        margin: 0 0 18px;
        word-wrap: break-word;
        text-shadow: var(--txt-shadow);
        text-align: center;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn {
        appearance: none;
        border: none;
        background: linear-gradient(180deg, #ffa726, #fb8c00);
        color: #1b1305;
        padding: 12px 16px;
        border-radius: 14px;
        font-weight: 800;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 6px 20px rgba(251, 140, 0, 0.35);
        transition: 0.18s ease;
        text-shadow: none; /* botão mantém contraste próprio */
      }
      .btn:hover {
        transform: translateY(-1px);
      }

      @media (max-width: 760px) {
        .row {
          grid-template-columns: 1fr;
        }
        .thumb {
          max-width: 300px;
          margin-inline: auto;
        }
        .line {
          margin-top: 4px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" aria-labelledby="t-title">
        <h1 class="title" id="t-title">404 — Page not found</h1>

        <div class="row">
          <figure class="thumb" aria-hidden="true">
            <img src="/assets/Yamcha_Death.png" alt="Yamcha Death" />
          </figure>

          <div class="content">
            <p class="line" id="t-line">
              Even Yamcha couldn’t survive this one.
            </p>
            <div class="actions">
              <a id="home-link" class="btn" href="/"> ⛩️ Go to homepage </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      // Ajusta idioma e rótulos conforme a rota
      (function () {
        var m = location.pathname.match(/^\/(pt-br|en-us|es-es)\b/i);
        var lang = m ? m[1].toLowerCase() : "en-us";

        var t = {
          "en-us": {
            title: "404 — Page not found",
            line: "Yamcha blew up and this page doesn't exist anymore.",
            home: "⛩️ Go to homepage",
            href: "/en-us/",
          },
          "pt-br": {
            title: "404 — Página não encontrada",
            line: "Gotenks errou a fusão — e esta página não existe.",
            home: "⛩️ Ir para a página inicial",
            href: "/pt-br/",
          },
          "es-es": {
            title: "404 — Página no encontrada",
            line: "Gotenks falló la fusión — y esta página no existe.",
            home: "⛩️ Ir a la página principal",
            href: "/es-es/",
          },
        }[lang];

        document.getElementById("t-title").textContent = t.title;
        document.getElementById("t-line").textContent = t.line;
        var link = document.getElementById("home-link");
        link.textContent = t.home;
        link.setAttribute("href", t.href);
      })();
    </script>
  </body>
</html>
