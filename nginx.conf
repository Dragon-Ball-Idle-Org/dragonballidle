server {
  listen 80;
  server_name dragonballdle.site;

  # Redireciona todo HTTP para HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name dragonballdle.site;
  root /usr/share/nginx/html;
  index index.html;

  # Certificados SSL (gerados pelo Certbot)
  ssl_certificate     /etc/letsencrypt/live/dragonballdle.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dragonballdle.site/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # Página 404 customizada
  error_page 404 /404.html;

  # Sem listagem de diretórios
  autoindex off;

  # MIME types
  types {
    image/x-icon              ico;
    application/manifest+json webmanifest;
    image/svg+xml             svg;
  }

  # Remover WWW
  if ($host ~* ^www\.(.+)$) {
    return 301 https://$1$request_uri;
  }

  # 1) Root "/" redireciona para /en-us/
  location = / {
    return 301 https://$host/en-us/;
  }

  # 2) Arquivos estáticos entregues diretamente com cache
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webmanifest)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # 3) sitemap, robots, 404 entregues diretamente
  location ~* ^/(sitemap\.xml|robots\.txt|404\.html)$ {
    try_files $uri =404;
  }

  # 4) Força barra final no root do idioma: /en-us → /en-us/
  location ~* ^/(pt-br|en-us|es-es|fr-fr|it-it|de-de|ru-ru|tr-tr|uk-ua|ar-sa|ja-jp|ko-kr|hi-in|th-th|vi-vn|id-id|zh-cn|zh-tw|fil-ph|ms-my)$ {
    return 301 https://$host$uri/;
  }

  # 5) Subrotas de idioma inexistentes → volta para root do idioma
  location ~* ^/(pt-br|en-us|es-es|fr-fr|it-it|de-de|ru-ru|tr-tr|uk-ua|ar-sa|ja-jp|ko-kr|hi-in|th-th|vi-vn|id-id|zh-cn|zh-tw|fil-ph|ms-my)/.+ {
    try_files $uri $uri/ @locale_fallback;
  }

  location @locale_fallback {
    rewrite ^/(pt-br|en-us|es-es|fr-fr|it-it|de-de|ru-ru|tr-tr|uk-ua|ar-sa|ja-jp|ko-kr|hi-in|th-th|vi-vn|id-id|zh-cn|zh-tw|fil-ph|ms-my)/.*$ https://$host/$1/ redirect;
  }

  # 6) SPA: roots dos idiomas servem o index.html
  location ~* ^/(pt-br|en-us|es-es|fr-fr|it-it|de-de|ru-ru|tr-tr|uk-ua|ar-sa|ja-jp|ko-kr|hi-in|th-th|vi-vn|id-id|zh-cn|zh-tw|fil-ph|ms-my)/$ {
    try_files /index.html =404;
  }
}