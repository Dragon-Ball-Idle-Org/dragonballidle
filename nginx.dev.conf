server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  error_page 404 /404.html;
  autoindex off;

  location = / {
    return 301 http://$http_host/en-us/;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webmanifest)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location ~* ^/(sitemap\.xml|robots\.txt|404\.html)$ {
    try_files $uri =404;
  }

  location ~* ^/(pt-br|en-us|es-es|fr-fr|it-it|de-de|ru-ru|tr-tr|uk-ua|ar-sa|ja-jp|ko-kr|hi-in|th-th|vi-vn|id-id|zh-cn|zh-tw|fil-ph|ms-my)$ {
    return 301 http://$http_host$uri/;
  }

  location ~* ^/(pt-br|en-us|es-es|fr-fr|it-it|de-de|ru-ru|tr-tr|uk-ua|ar-sa|ja-jp|ko-kr|hi-in|th-th|vi-vn|id-id|zh-cn|zh-tw|fil-ph|ms-my)/.+ {
    try_files $uri $uri/ @locale_fallback;
  }

  location @locale_fallback {
    rewrite ^/(pt-br|en-us|es-es|fr-fr|it-it|de-de|ru-ru|tr-tr|uk-ua|ar-sa|ja-jp|ko-kr|hi-in|th-th|vi-vn|id-id|zh-cn|zh-tw|fil-ph|ms-my)/.*$ http://$http_host/$1/ redirect;
  }

  location ~* ^/(pt-br|en-us|es-es|fr-fr|it-it|de-de|ru-ru|tr-tr|uk-ua|ar-sa|ja-jp|ko-kr|hi-in|th-th|vi-vn|id-id|zh-cn|zh-tw|fil-ph|ms-my)/$ {
    try_files /index.html =404;
  }
}